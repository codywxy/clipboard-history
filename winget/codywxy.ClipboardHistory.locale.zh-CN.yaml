ShortDescription: Windows 剪贴板历史管理工具 — 自动记录、智能搜索、一键复用
Description: |
  历史粘贴板是一款轻量级 Windows 剪贴板管理工具。
  在后台自动记录你复制的文本和图片，支持全文搜索、日期筛选、
  置顶、备注、暗色模式、全局快捷键（Ctrl+Alt+V），
  选中条目即可重新复制到剪贴板。
  所有数据本地存储，无需联网，安全可靠。
